<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Unity-like dark theme background -->
  <rect width="600" height="400" fill="#282828"/>
  
  <!-- Subtle UI lines -->
  <rect width="600" height="30" fill="#383838"/>
  <rect x="400" y="30" width="2" height="370" fill="#1E1E1E"/>

  <!-- Title/Header (Tab style) -->
  <g transform="translate(10, 5)">
    <rect x="0" y="0" width="160" height="25" rx="4" fill="#282828"/>
    <text x="15" y="17" fill="#E0E0E0" font-family="sans-serif" font-size="12" font-weight="bold">Custom Inspector</text>
  </g>

  <g transform="translate(175, 5)">
    <rect x="0" y="0" width="140" height="25" rx="4" fill="#383838"/>
    <text x="15" y="17" fill="#A0A0A0" font-family="sans-serif" font-size="12">Scene Tools</text>
  </g>

  <!-- Left Side: Custom Window / Inspector -->
  <g transform="translate(30, 60)">
    <!-- Header -->
    <rect x="0" y="0" width="340" height="40" rx="4" fill="#333333" stroke="#1E1E1E"/>
    <rect x="15" y="15" width="10" height="10" fill="#4B9CD3"/>
    <text x="35" y="24" fill="#E0E0E0" font-family="sans-serif" font-size="14" font-weight="bold">Level Setup Utility</text>
    
    <!-- Data Fields -->
    <!-- Field 1 -->
    <text x="15" y="70" fill="#B0B0B0" font-family="sans-serif" font-size="12">Difficulty Curve</text>
    <rect x="120" y="55" width="200" height="22" rx="2" fill="#1E1E1E" stroke="#444"/>
    <path d="M125 66 Q160 70 190 60 T250 66 T310 60" fill="none" stroke="#4ADE80" stroke-width="2"/>
    <circle cx="250" cy="66" r="4" fill="#4ADE80"/>

    <!-- Field 2 -->
    <text x="15" y="110" fill="#B0B0B0" font-family="sans-serif" font-size="12">Spawn Points</text>
    <rect x="120" y="95" width="200" height="22" rx="2" fill="#1E1E1E" stroke="#444"/>
    <text x="130" y="110" fill="#E0E0E0" font-family="sans-serif" font-size="12">Array (12 items)</text>
    <rect x="295" y="98" width="20" height="16" rx="2" fill="#444"/>
    <text x="301" y="110" fill="#E0E0E0" font-family="sans-serif" font-size="12">+</text>

    <!-- Build Button -->
    <rect x="15" y="145" width="305" height="35" rx="4" fill="#4B9CD3"/>
    <text x="167" y="168" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Generate Level Layout</text>

    <!-- Debug Log Panel -->
    <rect x="0" y="210" width="340" height="100" rx="4" fill="#1A1A1A" stroke="#333"/>
    <text x="15" y="235" fill="#4ADE80" font-family="monospace" font-size="11">[Success] Config validated.</text>
    <text x="15" y="255" fill="#4ADE80" font-family="monospace" font-size="11">[Success] Sprites mapped.</text>
    <text x="15" y="275" fill="#FACC15" font-family="monospace" font-size="11">[Warning] 1 overlapping point fixed.</text>
  </g>

  <!-- Right Side: Scripting / Architecture -->
  <g transform="translate(420, 60)">
    <!-- Class Tree -->
    <text x="10" y="20" fill="#A0A0A0" font-family="sans-serif" font-size="12" font-weight="bold">UTILITIES.DLL</text>
    
    <g transform="translate(10, 45)">
      <!-- EditorWindow -->
      <rect x="0" y="0" width="140" height="25" rx="4" fill="#1A1A1A" stroke="#C678DD"/>
      <text x="10" y="16" fill="#C678DD" font-family="monospace" font-size="10">EditorWindow</text>

      <path d="M 20 25 L 20 45 L 30 45" fill="none" stroke="#555" stroke-width="2"/>
      
      <!-- Custom Inspector -->
      <rect x="30" y="32" width="130" height="25" rx="4" fill="#1A1A1A" stroke="#61AFEF"/>
      <text x="40" y="48" fill="#61AFEF" font-family="monospace" font-size="10">LevelSetupWin</text>

      <!-- PropertyDrawer -->
      <rect x="0" y="80" width="140" height="25" rx="4" fill="#1A1A1A" stroke="#C678DD"/>
      <text x="10" y="96" fill="#C678DD" font-family="monospace" font-size="10">PropertyDrawer</text>
      
      <path d="M 20 105 L 20 125 L 30 125" fill="none" stroke="#555" stroke-width="2"/>

      <rect x="30" y="112" width="130" height="25" rx="4" fill="#1A1A1A" stroke="#61AFEF"/>
      <text x="40" y="128" fill="#61AFEF" font-family="monospace" font-size="10">CurveDrawer</text>

      <!-- Toolbox code block -->
      <rect x="0" y="170" width="160" height="85" rx="4" fill="#1A1A1A" stroke="#333"/>
      <text x="10" y="190" fill="#E5C07B" font-family="monospace" font-size="10">[MenuItem(...)]</text>
      <text x="10" y="205" fill="#E0E0E0" font-family="monospace" font-size="10">public static void</text>
      <text x="10" y="220" fill="#61AFEF" font-family="monospace" font-size="10">ShowUtility()</text>
      <text x="10" y="235" fill="#E0E0E0" font-family="monospace" font-size="10">{ GetWindow(); }</text>
    </g>
  </g>

  <!-- Glowing accents -->
  <circle cx="400" cy="200" r="100" fill="#C678DD" opacity="0.05" filter="blur(30px)"/>
</svg>