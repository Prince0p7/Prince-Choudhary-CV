<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark AI background -->
  <rect width="600" height="400" fill="#0D0D14"/>
  
  <!-- Subtle dotted grid pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#FFFFFF" opacity="0.05"/>
  </pattern>
  <rect width="600" height="400" fill="url(#dots)"/>

  <!-- Glowing background elements -->
  <circle cx="300" cy="200" r="150" fill="#EE4C2C" opacity="0.1" filter="blur(40px)"/>
  <circle cx="450" cy="150" r="100" fill="#FFE873" opacity="0.05" filter="blur(40px)"/>

  <!-- Title/Header -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" fill="#E0E0E0" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">AI_MODEL_INFERENCE.py</text>
    <line x1="0" y1="10" x2="190" y2="10" stroke="#EE4C2C" stroke-width="2"/>
  </g>

  <!-- Neural Network Visual -->
  <g transform="translate(450, 200)" stroke="#EE4C2C" stroke-width="1.5" opacity="0.6">
    <!-- Input layer -->
    <circle cx="-60" cy="-40" r="4" fill="#0D0D14"/>
    <circle cx="-60" cy="0" r="4" fill="#0D0D14"/>
    <circle cx="-60" cy="40" r="4" fill="#0D0D14"/>
    
    <!-- Hidden layer 1 -->
    <circle cx="-20" cy="-60" r="4" fill="#0D0D14"/>
    <circle cx="-20" cy="-20" r="4" fill="#0D0D14"/>
    <circle cx="-20" cy="20" r="4" fill="#0D0D14"/>
    <circle cx="-20" cy="60" r="4" fill="#0D0D14"/>
    
    <!-- Hidden layer 2 -->
    <circle cx="20" cy="-40" r="4" fill="#0D0D14"/>
    <circle cx="20" cy="0" r="4" fill="#0D0D14"/>
    <circle cx="20" cy="40" r="4" fill="#0D0D14"/>
    
    <!-- Output layer -->
    <circle cx="60" cy="-20" r="4" fill="#0D0D14"/>
    <circle cx="60" cy="20" r="4" fill="#0D0D14"/>

    <!-- Connections (simplified) -->
    <path d="M-60 -40 L-20 -60 M-60 -40 L-20 -20 M-60 0 L-20 -20 M-60 0 L-20 20 M-60 40 L-20 20 M-60 40 L-20 60" opacity="0.4"/>
    <path d="M-20 -60 L20 -40 M-20 -20 L20 -40 M-20 -20 L20 0 M-20 20 L20 0 M-20 20 L20 40 M-20 60 L20 40" opacity="0.4"/>
    <path d="M20 -40 L60 -20 M20 0 L60 -20 M20 0 L60 20 M20 40 L60 20" opacity="0.4"/>
  </g>

  <!-- Process Flow -->
  <g transform="translate(60, 180)">
    <!-- Source Image -->
    <rect x="0" y="-30" width="60" height="60" rx="4" fill="#1A1A24" stroke="#4B9CD3" stroke-width="2"/>
    <path d="M 10 10 L 25 -5 L 35 5 L 45 -10 L 50 -5" fill="none" stroke="#4B9CD3" stroke-width="2"/>
    <circle cx="20" cy="-10" r="4" fill="#4B9CD3"/>
    <text x="30" y="45" fill="#A0A0A0" font-family="sans-serif" font-size="10" text-anchor="middle">Raw Texture</text>

    <!-- Path to Model -->
    <path d="M 65 0 L 115 0" fill="none" stroke="#EE4C2C" stroke-width="2" stroke-dasharray="4 4"/>
    <polygon points="110,-5 120,0 110,5" fill="#EE4C2C"/>

    <!-- AI Model Node -->
    <rect x="130" y="-40" width="80" height="80" rx="12" fill="#1A1A24" stroke="#EE4C2C" stroke-width="2"/>
    <path d="M 145 -15 Q 170 -30 195 -15 Q 180 0 195 15 Q 170 30 145 15 Q 160 0 145 -15" fill="#EE4C2C" opacity="0.2"/>
    <text x="170" y="5" fill="#EE4C2C" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PyTorch</text>
    <text x="170" y="25" fill="#E0E0E0" font-family="monospace" font-size="8" text-anchor="middle">ONNX / OpenCV</text>
    <text x="170" y="55" fill="#A0A0A0" font-family="sans-serif" font-size="10" text-anchor="middle">Inference</text>

    <!-- Path to Output -->
    <path d="M 215 0 L 265 0" fill="none" stroke="#4ADE80" stroke-width="2" stroke-dasharray="4 4"/>
    <polygon points="260,-5 270,0 260,5" fill="#4ADE80"/>

    <!-- Output Image -->
    <rect x="280" y="-30" width="60" height="60" rx="4" fill="#1A1A24" stroke="#4ADE80" stroke-width="2"/>
    <path d="M 290 10 L 305 -5 L 315 5 L 325 -10 L 330 -5" fill="none" stroke="#4ADE80" stroke-width="2"/>
    <circle cx="300" cy="-10" r="4" fill="#4ADE80"/>
    <!-- Enhancements -->
    <path d="M 325 15 L 335 15 M 330 10 L 330 20" stroke="#FFE873" stroke-width="1.5"/>
    <text x="310" y="45" fill="#A0A0A0" font-family="sans-serif" font-size="10" text-anchor="middle">Enhanced/Masked</text>
  </g>

  <!-- Code block -->
  <g transform="translate(60, 290)">
    <rect x="0" y="0" width="220" height="60" rx="4" fill="#1A1A24" stroke="#2D2D3D" stroke-width="1"/>
    <text x="10" y="20" fill="#C678DD" font-family="monospace" font-size="10">import</text>
    <text x="50" y="20" fill="#E0E0E0" font-family="monospace" font-size="10">torch, cv2, onnxruntime</text>
    
    <text x="10" y="35" fill="#E0E0E0" font-family="monospace" font-size="10">mask =</text>
    <text x="50" y="35" fill="#61AFEF" font-family="monospace" font-size="10">segment_subject</text>
    <text x="145" y="35" fill="#E0E0E0" font-family="monospace" font-size="10">(img)</text>
    
    <text x="10" y="50" fill="#E0E0E0" font-family="monospace" font-size="10">clean_asset =</text>
    <text x="85" y="50" fill="#61AFEF" font-family="monospace" font-size="10">remove_bg</text>
    <text x="145" y="50" fill="#E0E0E0" font-family="monospace" font-size="10">(img, mask)</text>
  </g>
</svg>