<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean tech background -->
  <rect width="600" height="400" fill="#111827"/>
  
  <!-- Subtle networking grid -->
  <pattern id="net-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#1F2937"/>
    <path d="M 15 0 L 15 30 M 0 15 L 30 15" fill="none" stroke="#1F2937" stroke-width="0.5"/>
  </pattern>
  <rect width="600" height="400" fill="url(#net-grid)"/>

  <!-- Background ambiance -->
  <circle cx="300" cy="200" r="150" fill="#3B82F6" opacity="0.05" filter="blur(40px)"/>
  <circle cx="100" cy="130" r="80" fill="#10B981" opacity="0.05" filter="blur(30px)"/>
  <circle cx="500" cy="270" r="80" fill="#8B5CF6" opacity="0.05" filter="blur(30px)"/>

  <!-- Title/Header -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" fill="#E0E0E0" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">DATA_PIPELINE_SYNC.py</text>
    <line x1="0" y1="10" x2="200" y2="10" stroke="#3B82F6" stroke-width="2"/>
  </g>

  <!-- Network Connections (Background) -->
  <g stroke="#374151" stroke-width="2" stroke-dasharray="4 4" fill="none">
    <path d="M 120 150 L 300 200"/>
    <path d="M 120 250 L 300 200"/>
    <path d="M 300 200 L 480 200"/>
    
    <!-- Moving data packets -->
    <circle cx="0" cy="0" r="3" fill="#10B981" stroke="none">
      <animateMotion path="M 120 150 L 300 200" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#3B82F6" stroke="none">
      <animateMotion path="M 120 250 L 300 200" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#8B5CF6" stroke="none">
      <animateMotion path="M 300 200 L 480 200" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- External Data Source (Google Sheets) -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#1F2937" stroke="#10B981" stroke-width="2"/>
    <path d="M 20 20 H 40 M 20 35 H 80 M 20 50 H 60" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
    <text x="50" y="-10" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Google Sheets API</text>
  </g>

  <!-- External Repository / Build Trigger -->
  <g transform="translate(40, 210)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
    <!-- Git/Branch Icon -->
    <circle cx="25" cy="35" r="5" fill="#3B82F6"/>
    <circle cx="75" cy="20" r="5" fill="#3B82F6"/>
    <circle cx="75" cy="50" r="5" fill="#3B82F6"/>
    <path d="M 30 35 C 50 35, 50 20, 70 20 M 30 35 C 50 35, 50 50, 70 50" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <text x="50" y="-10" fill="#3B82F6" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Version Control</text>
  </g>

  <!-- Central Processing (Custom Python / CI server) -->
  <g transform="translate(250, 150)">
    <rect x="0" y="0" width="100" height="100" rx="50" fill="#1F2937" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#4B5563" stroke-width="4" stroke-dasharray="10 5">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
    </circle>
    <!-- Sync Icon -->
    <path d="M 35 45 A 15 15 0 0 1 65 45 L 60 55 M 65 55 A 15 15 0 0 1 35 55 L 40 45" fill="none" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="-10" fill="#E5E7EB" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Pipeline Hook</text>
  </g>

  <!-- Destination (Unity Engine) -->
  <g transform="translate(460, 160)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="#1F2937" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Unity Icon representation -->
    <polygon points="50,20 70,30 70,55 50,65 30,55 30,30" fill="none" stroke="#8B5CF6" stroke-width="3"/>
    <path d="M 50 20 L 50 42 M 30 55 L 50 42 M 70 55 L 50 42" stroke="#8B5CF6" stroke-width="3"/>
    <text x="50" y="-10" fill="#8B5CF6" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Game Engine</text>
  </g>

  <!-- Code Snippet Overlay -->
  <g transform="translate(160, 310)">
    <rect x="0" y="0" width="280" height="65" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="15" y="20" fill="#C678DD" font-family="monospace" font-size="10">async def</text>
    <text x="75" y="20" fill="#61AFEF" font-family="monospace" font-size="10">sync_game_data</text>
    <text x="160" y="20" fill="#E0E0E0" font-family="monospace" font-size="10">():</text>
    
    <text x="30" y="35" fill="#E0E0E0" font-family="monospace" font-size="10">data = get_sheet_json(SPREADSHEET_ID)</text>
    <text x="30" y="50" fill="#E0E0E0" font-family="monospace" font-size="10">trigger_unity_build(data,</text>
    <text x="180" y="50" fill="#98C379" font-family="monospace" font-size="10">"main"</text>
    <text x="215" y="50" fill="#E0E0E0" font-family="monospace" font-size="10">)</text>
  </g>
</svg>