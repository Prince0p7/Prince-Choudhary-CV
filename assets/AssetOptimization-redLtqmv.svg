<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark backdrop -->
  <rect width="600" height="400" fill="#18181A"/>
  
  <!-- 3D perspective grid -->
  <g stroke="#2C2C35" stroke-width="1" opacity="0.5">
    <path d="M 0 300 Q 300 350 600 300 M 0 350 Q 300 375 600 350 M 0 400 Q 300 400 600 400"/>
    <path d="M 100 250 L 50 400 M 200 250 L 150 400 M 300 250 L 300 400 M 400 250 L 450 400 M 500 250 L 550 400"/>
  </g>

  <!-- Glowing ambiance -->
  <circle cx="200" cy="200" r="120" fill="#06B6D4" opacity="0.1" filter="blur(40px)"/>
  <circle cx="450" cy="180" r="100" fill="#F97316" opacity="0.1" filter="blur(40px)"/>

  <!-- Title -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" fill="#E0E0E0" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">LOD_GENERATOR.py</text>
    <line x1="0" y1="10" x2="140" y2="10" stroke="#06B6D4" stroke-width="2"/>
  </g>

  <!-- Retopology / LOD Visual -->
  <g transform="translate(45, 120)">
    <!-- LOD0 (High Poly) -->
    <g transform="translate(0, 0)">
      <polygon points="0,0 40,-40 80,0 40,40" fill="#06B6D4" opacity="0.2" stroke="#06B6D4" stroke-width="0.5"/>
      <!-- Draw internal lines for high poly -->
      <path d="M 40 -40 L 40 40 M 0 0 L 80 0 M 20 -20 L 60 20 M 20 20 L 60 -20" stroke="#06B6D4" stroke-width="0.5" opacity="0.5"/>
      <path d="M 10 -10 L 70 10 M 10 10 L 70 -10" stroke="#06B6D4" stroke-width="0.5" opacity="0.5"/>
      <text x="40" y="65" fill="#06B6D4" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">LOD 0</text>
      <text x="40" y="80" fill="#A0A0A0" font-family="monospace" font-size="10" text-anchor="middle">24k Tris</text>
    </g>

    <!-- Arrow -->
    <path d="M 100 0 L 130 0" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="4 4"/>
    <polygon points="125,-5 135,0 125,5" fill="#E0E0E0"/>

    <!-- LOD1 (Mid Poly) -->
    <g transform="translate(150, 0)">
      <polygon points="0,0 40,-40 80,0 40,40" fill="#0EA5E9" opacity="0.2" stroke="#0EA5E9" stroke-width="1"/>
      <path d="M 40 -40 L 40 40 M 0 0 L 80 0" stroke="#0EA5E9" stroke-width="1" opacity="0.8"/>
      <text x="40" y="65" fill="#0EA5E9" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">LOD 1</text>
      <text x="40" y="80" fill="#A0A0A0" font-family="monospace" font-size="10" text-anchor="middle">8k Tris</text>
    </g>

    <!-- Arrow -->
    <path d="M 250 0 L 280 0" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="4 4"/>
    <polygon points="275,-5 285,0 275,5" fill="#E0E0E0"/>

    <!-- LOD2 (Low Poly) -->
    <g transform="translate(300, 0)">
      <polygon points="0,0 40,-40 80,0 40,40" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
      <path d="M 40 -40 L 40 40" stroke="#3B82F6" stroke-width="2" opacity="0.8"/>
      <text x="40" y="65" fill="#3B82F6" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">LOD 2</text>
      <text x="40" y="80" fill="#A0A0A0" font-family="monospace" font-size="10" text-anchor="middle">1.2k Tris</text>
    </g>
  </g>

  <!-- Baking / UV Visual -->
  <g transform="translate(440, 60)">
    <rect x="0" y="0" width="130" height="180" rx="8" fill="#202022" stroke="#3F3F46" stroke-width="2"/>
    <text x="65" y="25" fill="#F97316" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Baking Pipeline</text>
    
    <!-- Maps -->
    <rect x="20" y="40" width="40" height="40" rx="2" fill="#2DD4BF" opacity="0.2" stroke="#2DD4BF"/>
    <text x="40" y="64" fill="#2DD4BF" font-family="monospace" font-size="10" text-anchor="middle">NRM</text>

    <rect x="70" y="40" width="40" height="40" rx="2" fill="#E879F9" opacity="0.2" stroke="#E879F9"/>
    <text x="90" y="64" fill="#E879F9" font-family="monospace" font-size="10" text-anchor="middle">AO</text>

    <rect x="20" y="90" width="40" height="40" rx="2" fill="#FBBF24" opacity="0.2" stroke="#FBBF24"/>
    <text x="40" y="114" fill="#FBBF24" font-family="monospace" font-size="10" text-anchor="middle">ALB</text>

    <rect x="70" y="90" width="40" height="40" rx="2" fill="#9CA3AF" opacity="0.2" stroke="#9CA3AF"/>
    <text x="90" y="114" fill="#9CA3AF" font-family="monospace" font-size="10" text-anchor="middle">RGH</text>

    <!-- Script command -->
    <rect x="15" y="145" width="100" height="20" rx="2" fill="#000"/>
    <text x="20" y="159" fill="#4ADE80" font-family="monospace" font-size="9">> bake_maps()</text>
  </g>

  <!-- Bottom script window -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="280" height="80" rx="4" fill="#141416" stroke="#2C2C35"/>
    <text x="15" y="20" fill="#E5C07B" font-family="monospace" font-size="10">def</text>
    <text x="40" y="20" fill="#61AFEF" font-family="monospace" font-size="10">process_asset</text>
    <text x="120" y="20" fill="#E0E0E0" font-family="monospace" font-size="10">(mesh_path):</text>

    <text x="30" y="35" fill="#E0E0E0" font-family="monospace" font-size="10">mesh = load(mesh_path)</text>
    <text x="30" y="50" fill="#C678DD" font-family="monospace" font-size="10">await</text>
    <text x="65" y="50" fill="#E0E0E0" font-family="monospace" font-size="10">uv_unwrap(mesh)</text>
    <text x="30" y="65" fill="#E0E0E0" font-family="monospace" font-size="10">generate_lods(mesh, levels=3)</text>
  </g>
</svg>