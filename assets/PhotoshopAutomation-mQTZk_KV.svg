<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Adobe-like deep background -->
  <rect width="600" height="400" fill="#141414"/>
  
  <!-- Subtle line pattern -->
  <pattern id="lines" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 20" fill="none" stroke="#252525" stroke-width="1"/>
  </pattern>
  <rect width="600" height="400" fill="url(#lines)"/>

  <!-- Glowing Photoshop Blue background elements -->
  <circle cx="300" cy="200" r="150" fill="#31CAFF" opacity="0.1" filter="blur(40px)"/>

  <!-- Title/Header -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" fill="#E0E0E0" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">BATCH_PROCESS.js</text>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#31CAFF" stroke-width="2"/>
  </g>

  <!-- Photoshop Toolbar Representation -->
  <rect x="30" y="80" width="40" height="250" rx="4" fill="#202020" stroke="#333" stroke-width="2"/>
  <rect x="40" y="90" width="20" height="20" rx="2" fill="#333"/>
  <rect x="40" y="120" width="20" height="20" rx="2" fill="#333"/>
  <rect x="40" y="150" width="20" height="20" rx="2" fill="#333"/>
  <rect x="40" y="180" width="20" height="20" rx="2" fill="#31CAFF" opacity="0.5"/>

  <!-- Automated Export Process -->
  <g transform="translate(120, 150)">
    <!-- Paths -->
    <path d="M 40 20 L 120 20" fill="none" stroke="#31CAFF" stroke-width="2" stroke-dasharray="6 4">
    </path>
    <path d="M 180 20 L 260 -20" fill="none" stroke="#31CAFF" stroke-width="2" stroke-dasharray="6 4">
    </path>
    <path d="M 180 20 L 260 60" fill="none" stroke="#31CAFF" stroke-width="2" stroke-dasharray="6 4">
    </path>

    <!-- Source Node -->
    <g transform="translate(40, 20)">
      <rect x="-20" y="-20" width="40" height="40" rx="4" fill="#00182D" stroke="#31CAFF" stroke-width="2"/>
      <text x="0" y="5" fill="#31CAFF" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Ps</text>
      <text x="0" y="40" fill="#A0A0A0" font-family="sans-serif" font-size="10" text-anchor="middle">PSD Source</text>
    </g>

    <!-- Processor Node -->
    <g transform="translate(150, 20)">
      <circle cx="0" cy="0" r="25" fill="#2D2D2D" stroke="#E0E0E0" stroke-width="2"/>
      <polygon points="-5,-10 10,0 -5,10" fill="#31CAFF"/>
      <text x="0" y="40" fill="#A0A0A0" font-family="sans-serif" font-size="10" text-anchor="middle">UXP Script</text>
    </g>

    <!-- Output Nodes -->
    <g transform="translate(280, -20)">
      <path d="M-15,-15 h30 v30 h-30 z" fill="#2D2D2D" stroke="#4ADE80" stroke-width="2"/>
      <text x="0" y="32" fill="#4ADE80" font-family="monospace" font-size="10" text-anchor="middle">.PNG</text>
    </g>

    <g transform="translate(280, 60)">
      <path d="M-15,-15 h30 v30 h-30 z" fill="#2D2D2D" stroke="#A78BFA" stroke-width="2"/>
      <text x="0" y="32" fill="#A78BFA" font-family="monospace" font-size="10" text-anchor="middle">.TGA</text>
    </g>
  </g>

  <!-- Script Code Block -->
  <rect x="400" y="80" width="160" height="120" rx="6" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
  <g transform="translate(415, 100)">
    <text x="0" y="0" fill="#C678DD" font-family="monospace" font-size="10">const</text>
    <text x="35" y="0" fill="#E0E0E0" font-family="monospace" font-size="10">batch =</text>
    <text x="0" y="15" fill="#61AFEF" font-family="monospace" font-size="10">require</text>
    <text x="45" y="15" fill="#98C379" font-family="monospace" font-size="10">('photoshop')</text>
    <text x="0" y="35" fill="#E5C07B" font-family="monospace" font-size="10">exportLayers</text>
    <text x="75" y="35" fill="#E0E0E0" font-family="monospace" font-size="10">(</text>
    <text x="0" y="50" fill="#E0E0E0" font-family="monospace" font-size="10">  document,</text>
    <text x="0" y="65" fill="#E0E0E0" font-family="monospace" font-size="10">  presets</text>
    <text x="0" y="80" fill="#E0E0E0" font-family="monospace" font-size="10">);</text>
  </g>

  <!-- Decorative Accents -->
  <g transform="translate(50, 350)">
    <circle cx="0" cy="0" r="4" fill="#31CAFF"/>
    <circle cx="15" cy="0" r="4" fill="#31CAFF" opacity="0.5"/>
    <circle cx="30" cy="0" r="4" fill="#31CAFF" opacity="0.2"/>
  </g>
</svg>